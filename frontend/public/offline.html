<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#002147" />
    <title>Offline | JBC Athenaeum</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, system-ui, sans-serif;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }
      section {
        max-width: 560px;
        border: 1px solid #cbd5e1;
        border-radius: 18px;
        background: white;
        padding: 32px;
        text-align: center;
      }
      img {
        width: 96px;
        height: 96px;
        border-radius: 18px;
      }
      h1 {
        color: #002147;
        font-family: Georgia, serif;
      }
      p {
        color: #475569;
        line-height: 1.65;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        margin-top: 12px;
        border-radius: 10px;
        background: #002147;
        color: white;
        padding: 0 20px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <img src="/icons/icon-192.png" alt="JBC Athenaeum" />
        <h1>You’re offline</h1>
        <p>
          The application shell is available, but search, account information,
          notifications, bookmarks, download history, and protected documents
          require a network connection.
        </p>
        <a href="/">Try again</a>
      </section>
    </main>
  </body>
</html>
